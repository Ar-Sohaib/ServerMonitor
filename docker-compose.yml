services:
  monitor:
    build: .
    container_name: server-monitor
    ports:
      - "${MONITOR_PORT:-8080}:8080"
    volumes:
      - ./servers.yml:/app/servers.yml:ro
      - ./keys/monitoring_ed25519:/keys/monitoring_ed25519:ro
    environment:
      MONITOR_PORT: "${MONITOR_PORT:-8080}"
      MONITOR_HOST: "0.0.0.0"
      SERVERS_CONFIG: "/app/servers.yml"
      COLLECT_INTERVAL: "30"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/servers')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s