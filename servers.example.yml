# Server Monitor — SSH polling configuration
# Copy this file to servers.yml and fill in your details.
#
# The poller connects to each server via SSH, runs a Python snippet
# entirely in memory, and returns metrics as JSON.
# Nothing is installed or stored on the monitored servers.

# Seconds between polls per server (minimum ~10, recommended 30)
poll_interval: 30

servers:
  # ── Linux server — SSH key auth (recommended) ──────────────────────
  - id: web-01                      # Unique name shown in the dashboard
    host: 192.168.1.10
    port: 22                        # Optional — defaults to 22
    user: ubuntu
    ssh_key: /keys/id_rsa           # Path inside the container (see docker-compose.yml)

  # ── Linux server — password auth ───────────────────────────────────
  - id: db-01
    host: 192.168.1.11
    user: root
    password: "yourpassword"        # Consider using SSH key instead

  # ── Linux server with NVIDIA GPU ───────────────────────────────────
  - id: gpu-server
    host: 192.168.1.12
    user: admin
    ssh_key: /keys/id_rsa
    # GPU info is detected automatically if nvidia-smi is present

  # ── Non-standard SSH port ───────────────────────────────────────────
  - id: bastion
    host: 10.0.0.5
    port: 2222
    user: ops
    ssh_key: /keys/id_rsa_bastion   # You can mount multiple keys
